<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Captif - Infratech-Guest</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="portal-container">
        
        <aside class="illustration-corporate">
            <div class="consignes">
                <h2>Sécurité Physique Data Center</h2>
                <p>Rappel : L'accès aux salles serveurs est strictement restreint au personnel autorisé par badge. Tout visiteur doit être accompagné.</p>
            </div>
        </aside>

        <section class="formulaire-auth">
            <h1>Connexion Wi-Fi Invités</h1>
            <p>Veuillez vous authentifier pour accepter la charte et accéder à Internet.</p>

            <form action="#" method="POST">
                <label for="identifiant">Identifiant ou Code temporaire :</label>
                <input type="text" id="identifiant" name="identifiant" required autocomplete="username">

                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">

                <button type="submit">Accepter et se connecter</button>
            </form>
        </section>

    </main>

</body>
</html>
